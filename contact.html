<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Muskan - IT Inquiries & Collaboration</title>
    
    <meta name="description" content="Contact Muskan for professional IT consultations, system optimizations, and server management inquiries.">
    <meta name="keywords" content="Contact IT Expert, SysAdmin Consultation, Hire Server Manager">
    <meta name="author" content="Muskan">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/style.css">
    
    <style>
        .contact-form {
            background: var(--light-gray);
            padding: 40px;
            border-radius: 20px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            background: white;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .contact-info-list li {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .contact-info-list i {
            width: 50px;
            height: 50px;
            background: var(--bg-white);
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body>

    <header id="main-header"></header>

    <main>
        <section class="contact-hero hero" style="min-height: 400px; padding: 120px 0;">
            <div class="container">
                <div class="hero-content">
                    <h1>Get In <span>Touch</span>.</h1>
                    <p>Have a technical inquiry, system outage, or a high-performance project? Reach out below.</p>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <div class="container">
                <div style="display: grid; grid-template-columns: 2fr 3fr; gap: 80px;">
                    <div class="contact-info">
                        <h2>Contact Information</h2>
                        <ul class="contact-info-list" style="margin-top: 40px;">
                            <li>
                                <i class="fas fa-envelope"></i>
                                <div>
                                    <h4 style="margin-bottom: 5px;">Email Me</h4>
                                    <p>contact@muskan.dev</p>
                                </div>
                            </li>
                            <li>
                                <i class="fas fa-map-marker-alt"></i>
                                <div>
                                    <h4 style="margin-bottom: 5px;">Located In</h4>
                                    <p>Global Remote Support World-wide</p>
                                </div>
                            </li>
                            <li>
                                <i class="fas fa-clock"></i>
                                <div>
                                    <h4 style="margin-bottom: 5px;">Working Hours</h4>
                                    <p>Mon - Fri, 9:00 AM - 6:00 PM</p>
                                </div>
                            </li>
                        </ul>
                    </div>
                    
                    <div class="contact-form">
                        <form id="contactForm" action="#" method="POST">
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                            </div>
                            <div class="form-group">
                                <label for="subject">Subject</label>
                                <input type="text" id="subject" name="subject" placeholder="What can I help with?" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Your Message</label>
                                <textarea id="message" name="message" rows="5" placeholder="Tell me about your IT needs..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Inquiry</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="js/components.js"></script>
    <script>
        // Simple form validation or demonstration of submission
        document.getElementById('contactForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Thank you for reaching out, Muskan will contact you shortly!');
        });
    </script>
</body>
</html>
